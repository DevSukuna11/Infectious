<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infectious 🦠 Settings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            color: #00ff00;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 30px 20px;
        }
        .settings-container {
            max-width: 1200px;
            margin: 0 auto;
            animation: popIn 0.5s ease-out;
        }
        h1 {
            margin-bottom: 30px;
            text-shadow: 0 0 15px #00ff00;
        }
        .section {
            margin-bottom: 40px;
        }
        .section h2 {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #00ff00;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
        }
        .themes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .theme-option {
            padding: 15px;
            border: 2px solid #00ff00;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            background-color: rgba(0, 255, 0, 0.05);
        }
        .theme-option:hover {
            background-color: rgba(0, 255, 0, 0.15);
            box-shadow: 0 0 15px #00ff00;
        }
        .theme-option.active {
            background-color: #00ff00;
            color: #000;
        }
        .color-swatch {
            width: 80px;
            height: 80px;
            border: 2px solid #00ff00;
            border-radius: 6px;
            margin: 0 auto 10px;
        }
        .bg-upload {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 30px;
        }
        .bg-upload input {
            flex: 1;
            padding: 10px 12px;
            background-color: rgba(0, 255, 0, 0.05);
            border: 1px solid #00ff00;
            color: #00ff00;
            border-radius: 6px;
        }
        .bg-upload button {
            padding: 10px 20px;
            background-color: transparent;
            border: 2px solid #00ff00;
            color: #00ff00;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .bg-upload button:hover {
            background-color: #00ff00;
            color: #000;
        }
        .particles-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .particle-option {
            padding: 12px;
            border: 1px solid #00ff00;
            border-radius: 6px;
            cursor: pointer;
            background-color: rgba(0, 255, 0, 0.05);
            transition: all 0.3s ease;
        }
        .particle-option:hover {
            background-color: rgba(0, 255, 0, 0.15);
        }
        .particle-option.active {
            background-color: #00ff00;
            color: #000;
        }
        .save-btn {
            padding: 15px 40px;
            background-color: transparent;
            border: 2px solid #00ff00;
            color: #00ff00;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 30px;
        }
        .save-btn:hover {
            background-color: #00ff00;
            color: #000;
            box-shadow: 0 0 20px #00ff00;
        }
        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="settings-container">
        <h1>Infectious 🦠 Settings</h1>
        
        <div class="section">
            <h2>🎨 Color Theme</h2>
            <div class="themes-grid">
                <div class="theme-option" onclick="selectTheme('amber')"><div class="color-swatch" style="background: linear-gradient(135deg, #000 0%, #ffb000 100%);"></div>Amber</div>
                <div class="theme-option" onclick="selectTheme('cyan')"><div class="color-swatch" style="background: linear-gradient(135deg, #000 0%, #00d4ff 100%);"></div>Cyan</div>
                <div class="theme-option" onclick="selectTheme('violet')"><div class="color-swatch" style="background: linear-gradient(135deg, #000 0%, #b000ff 100%);"></div>Violet</div>
                <div class="theme-option" onclick="selectTheme('emerald')"><div class="color-swatch" style="background: linear-gradient(135deg, #000 0%, #00ff7f 100%);"></div>Emerald</div>
                <div class="theme-option" onclick="selectTheme('rose')"><div class="color-swatch" style="background: linear-gradient(135deg, #000 0%, #ff1493 100%);"></div>Rose</div>
                <div class="theme-option" onclick="selectTheme('slate')"><div class="color-swatch" style="background: linear-gradient(135deg, #000 0%, #c0c0c0 100%);"></div>Slate</div>
                <div class="theme-option" onclick="selectTheme('crimson')"><div class="color-swatch" style="background: linear-gradient(135deg, #000 0%, #ff0000 100%);"></div>Crimson</div>
                <div class="theme-option" onclick="selectTheme('teal')"><div class="color-swatch" style="background: linear-gradient(135deg, #000 0%, #00ffff 100%);"></div>Teal</div>
                <div class="theme-option" onclick="selectTheme('indigo')"><div class="color-swatch" style="background: linear-gradient(135deg, #000 0%, #4169e1 100%);"></div>Indigo</div>
                <div class="theme-option" onclick="selectTheme('fuchsia')"><div class="color-swatch" style="background: linear-gradient(135deg, #000 0%, #ff00ff 100%);"></div>Fuchsia</div>
            </div>
        </div>

        <div class="section">
            <h2>🖼️ Background</h2>
            <div class="bg-upload">
                <input type="text" id="bgUrl" placeholder="Enter image URL...">
                <button onclick="applyBackground()">Apply</button>
            </div>
        </div>

        <div class="section">
            <h2>✨ Particles</h2>
            <div class="particles-options">
                <div class="particle-option" onclick="selectParticles('snowdots')">❄ Falling Snow</div>
                <div class="particle-option" onclick="selectParticles('stars')">✨ Stars</div>
                <div class="particle-option" onclick="selectParticles('hearts-red')">❤ Red Hearts</div>
                <div class="particle-option" onclick="selectParticles('hearts-purple')">💜 Purple Hearts</div>
                <div class="particle-option" onclick="selectParticles('hearts-blue')">💙 Blue Hearts</div>
                <div class="particle-option" onclick="selectParticles('hearts-green')">💚 Green Hearts</div>
                <div class="particle-option" onclick="selectParticles('off')">🚫 Off</div>
            </div>
        </div>

        <button class="save-btn" onclick="saveSettings()">💾 Save Settings</button>
    </div>

    <script>
        let selectedTheme = localStorage.getItem('theme') || 'emerald';
        let selectedParticles = localStorage.getItem('particles') || 'snowdots';
        let selectedBg = localStorage.getItem('background') || '';

        function selectTheme(theme) {
            selectedTheme = theme;
            document.querySelectorAll('.theme-option').forEach(el => el.classList.remove('active'));
            event.target.closest('.theme-option').classList.add('active');
        }

        function applyBackground() {
            selectedBg = document.getElementById('bgUrl').value;
        }

        function selectParticles(particle) {
            selectedParticles = particle;
            document.querySelectorAll('.particle-option').forEach(el => el.classList.remove('active'));
            event.target.closest('.particle-option').classList.add('active');
        }

        function saveSettings() {
            localStorage.setItem('theme', selectedTheme);
            localStorage.setItem('particles', selectedParticles);
            localStorage.setItem('background', selectedBg);
            localStorage.setItem('particlesEnabled', selectedParticles !== 'off');
            
            // Update parent window
            parent.document.body.className = `theme-${selectedTheme}`;
            if (selectedBg) {
                parent.document.body.style.backgroundImage = `url('${selectedBg}')`;
                parent.document.body.style.backgroundSize = 'cover';
                parent.document.body.style.backgroundAttachment = 'fixed';
            }
            
            alert('✅ Settings saved!');
            location.reload();
        }

        window.addEventListener('load', () => {
            const savedTheme = localStorage.getItem('theme') || 'emerald';
            const savedParticles = localStorage.getItem('particles') || 'snowdots';
            const savedBg = localStorage.getItem('background') || '';
            
            document.querySelector(`[onclick="selectTheme('${savedTheme}')"]`)?.classList.add('active');
            document.querySelector(`[onclick="selectParticles('${savedParticles}')"]`)?.classList.add('active');
            if (savedBg) {
                document.getElementById('bgUrl').value = savedBg;
            }
        });
    </script>
</body>
</html>
