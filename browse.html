<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infectious 🦠 Browse</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="browse-styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1 class="title">Infectious 🦠</h1>
                <button class="menu-toggle" id="menuToggle">🪛</button>
            </div>
            <nav class="dropdown-menu" id="dropdownMenu">
                <a href="index.html" class="nav-item">Home 🏠</a>
                <a href="games.html" class="nav-item">Games 🎮</a>
                <a href="watch.html" class="nav-item">Watch ▶</a>
                <a href="apps.html" class="nav-item">Apps 📱</a>
                <a href="music.html" class="nav-item">Listen 🎧</a>
                <a href="chat.html" class="nav-item">Chat 💬 <span class="badge">Coming Soon</span></a>
                <a href="ai.html" class="nav-item">AI 🤖 <span class="badge">Coming Soon</span></a>
                <a href="browse.html" class="nav-item">Browse 🌐</a>
            </nav>
        </header>
        <main class="content">
            <h2>Infectious 🦠 Browse</h2>
            <div class="browser-controls">
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search with DuckDuckGo" class="search-input">
                    <button id="searchBtn" class="btn">Search</button>
                </div>
                <button id="newTabBtn" class="btn">New Tab +</button>
                <button id="addShortcutBtn" class="btn">Add Shortcut +</button>
            </div>
            <div class="tabs-container">
                <div class="tabs" id="tabsList"></div>
            </div>
            <div class="shortcuts-container">
                <div id="shortcuts" class="shortcuts"></div>
            </div>
            <div class="iframe-container">
                <iframe id="browserFrame" src=""></iframe>
            </div>
        </main>
    </div>
    <div id="shortcutModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h3>Add Shortcut</h3>
            <form id="shortcutForm">
                <input type="text" id="shortcutName" placeholder="Shortcut Name" required>
                <input type="url" id="shortcutURL" placeholder="URL" required>
                <input type="url" id="shortcutImage" placeholder="Image URL (optional)">
                <button type="submit" class="btn">Add</button>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
    <script src="browse-script.js"></script>
</body>
</html>
