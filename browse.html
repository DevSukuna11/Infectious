<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infectious 🦠 Browse</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            color: #00ff00;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            height: 100vh;
        }
        .browse-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: 100vh;
            animation: popIn 0.5s ease-out;
        }
        h1 {
            margin-bottom: 10px;
        }
        .controls {
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 10px 12px;
            background-color: rgba(0, 255, 0, 0.05);
            border: 1px solid #00ff00;
            color: #00ff00;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        button {
            padding: 10px 20px;
            background-color: transparent;
            border: 1px solid #00ff00;
            color: #00ff00;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        button:hover {
            background-color: #00ff00;
            color: #000;
        }
        .iframe-container {
            flex: 1;
            border: 2px solid #00ff00;
            border-radius: 8px;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="browse-container">
        <h1>Infectious🦠 Browse</h1>
        <div class="controls">
            <input type="text" id="searchInput" placeholder="Search with DuckDuckGo...">
            <button onclick="search()">Search</button>
        </div>
        <div class="iframe-container">
            <iframe id="browseFrame"></iframe>
        </div>
    </div>
    <script>
        function search() {
            const query = document.getElementById('searchInput').value;
            if (query) {
                document.getElementById('browseFrame').src = `https://duckduckgo.com/?q=${encodeURIComponent(query)}`;
            }
        }
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') search();
        });
    </script>
</body>
</html>
