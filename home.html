<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infectious 🦠 Home</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            color: #00ff00;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .home-container {
            text-align: center;
            max-width: 900px;
            padding: 40px 20px;
            animation: popIn 0.5s ease-out;
        }
        h1 {
            font-size: 5rem;
            margin-bottom: 30px;
            text-shadow: 0 0 30px #00ff00;
            letter-spacing: 3px;
        }
        .search-box {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background-color: rgba(0, 255, 0, 0.05);
            border: 2px solid #00ff00;
            border-radius: 24px;
            margin-bottom: 40px;
            transition: all 0.3s ease;
        }
        .search-box:focus-within {
            background-color: rgba(0, 255, 0, 0.1);
            box-shadow: 0 0 15px #00ff00;
        }
        .search-box input {
            flex: 1;
            background: none;
            border: none;
            color: #00ff00;
            font-size: 1rem;
            outline: none;
        }
        .search-box input::placeholder {
            color: rgba(0, 255, 0, 0.4);
        }
        .shortcuts {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .shortcut {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            text-decoration: none;
            color: #00ff00;
            transition: all 0.3s ease;
        }
        .shortcut-icon {
            width: 60px;
            height: 60px;
            border: 2px solid rgba(0, 255, 0, 0.3);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }
        .shortcut:hover .shortcut-icon {
            border-color: #00ff00;
            background-color: rgba(0, 255, 0, 0.1);
            box-shadow: 0 0 15px #00ff00;
        }
        .shortcut-label {
            font-size: 0.85rem;
            color: rgba(0, 255, 0, 0.6);
        }
        .shortcut:hover .shortcut-label {
            color: #00ff00;
        }
        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="home-container">
        <h1>Infectious 🦠</h1>
        <div class="search-box">
            <span>🔍</span>
            <input type="text" placeholder="Infectious🦠://NewTAB">
        </div>
        <div class="shortcuts">
            <a href="javascript:parent.parent.loadPage('https://monochrome.tf')" class="shortcut">
                <div class="shortcut-icon">🎧</div>
                <div class="shortcut-label">Monochrome</div>
            </a>
            <a href="javascript:parent.parent.loadPage('https://youtube.com')" class="shortcut">
                <div class="shortcut-icon">▶</div>
                <div class="shortcut-label">YouTube</div>
            </a>
            <a href="javascript:parent.parent.loadPage('https://github.com')" class="shortcut">
                <div class="shortcut-icon">🐙</div>
                <div class="shortcut-label">GitHub</div>
            </a>
            <a href="javascript:parent.parent.loadPage('https://discord.com')" class="shortcut">
                <div class="shortcut-icon">💬</div>
                <div class="shortcut-label">Discord</div>
            </a>
            <a href="javascript:parent.parent.loadPage('https://twitter.com')" class="shortcut">
                <div class="shortcut-icon">𝕏</div>
                <div class="shortcut-label">Twitter</div>
            </a>
            <a href="javascript:parent.parent.loadPage('https://reddit.com')" class="shortcut">
                <div class="shortcut-icon">🔴</div>
                <div class="shortcut-label">Reddit</div>
            </a>
        </div>
    </div>
</body>
</html>
