<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infectious 🦠 Home</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            color: #00ff00;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }
        
        /* Animated background particles */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            pointer-events: none;
            z-index: 0;
        }
        
        .particle-dot {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #00ff00;
            opacity: 0.3;
            animation: float 20s infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); opacity: 0.3; }
            50% { transform: translateY(-20px); opacity: 0.6; }
        }
        
        .left-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        
        .cat-emoji {
            font-size: 15rem;
            text-shadow: 0 0 30px #00ff00;
            animation: glow 3s ease-in-out infinite;
            filter: drop-shadow(0 0 20px #00ff00);
        }
        
        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 20px #00ff00); }
            50% { filter: drop-shadow(0 0 40px #00ff00); }
        }
        
        .right-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            z-index: 10;
        }
        
        .title {
            font-size: 3rem;
            text-shadow: 0 0 30px #00ff00;
            letter-spacing: 3px;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .search-box {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background-color: rgba(0, 255, 0, 0.05);
            border: 2px solid #00ff00;
            border-radius: 24px;
            transition: all 0.3s ease;
            width: 300px;
        }
        
        .search-box:focus-within {
            background-color: rgba(0, 255, 0, 0.1);
            box-shadow: 0 0 15px #00ff00;
        }
        
        .search-box input {
            flex: 1;
            background: none;
            border: none;
            color: #00ff00;
            font-size: 1rem;
            outline: none;
        }
        
        .search-box input::placeholder {
            color: rgba(0, 255, 0, 0.4);
        }
        
        .shortcuts {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .shortcut {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            text-decoration: none;
            color: #00ff00;
            transition: all 0.3s ease;
        }
        
        .shortcut-icon {
            width: 60px;
            height: 60px;
            border: 2px solid rgba(0, 255, 0, 0.3);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }
        
        .shortcut:hover .shortcut-icon {
            border-color: #00ff00;
            background-color: rgba(0, 255, 0, 0.1);
            box-shadow: 0 0 15px #00ff00;
        }
        
        .shortcut-label {
            font-size: 0.85rem;
            color: rgba(0, 255, 0, 0.6);
        }
        
        .shortcut:hover .shortcut-label {
            color: #00ff00;
        }
        
        @media (max-width: 1024px) {
            body {
                flex-direction: column;
            }
            
            .cat-emoji {
                font-size: 8rem;
            }
            
            .title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-particles" id="bgParticles"></div>
    
    <div class="left-section">
        <div class="cat-emoji">🐱</div>
    </div>
    
    <div class="right-section">
        <div class="title">Infectious🦠</div>
        <div class="search-box">
            <span>🔍</span>
            <input type="text" placeholder="Infectious🦠://NewTab">
        </div>
        <div class="shortcuts">
            <a onclick="parent.navigateTo('music')" class="shortcut">
                <div class="shortcut-icon">🎧</div>
                <div class="shortcut-label">Spotify</div>
            </a>
            <a onclick="parent.navigateTo('watch')" class="shortcut">
                <div class="shortcut-icon">▶</div>
                <div class="shortcut-label">Movies</div>
            </a>
            <a onclick="parent.createTab('https://github.com', 'Infectious🦠__GitHub')" class="shortcut">
                <div class="shortcut-icon">🐙</div>
                <div class="shortcut-label">GitHub</div>
            </a>
            <a onclick="parent.createTab('https://discord.com', 'Infectious🦠__Discord')" class="shortcut">
                <div class="shortcut-icon">💬</div>
                <div class="shortcut-label">Discord</div>
            </a>
            <a onclick="parent.createTab('https://twitter.com', 'Infectious🦠__Twitter')" class="shortcut">
                <div class="shortcut-icon">𝕏</div>
                <div class="shortcut-label">Twitter</div>
            </a>
            <a onclick="parent.createTab('https://reddit.com', 'Infectious🦠__Reddit')" class="shortcut">
                <div class="shortcut-icon">🔴</div>
                <div class="shortcut-label">Reddit</div>
            </a>
        </div>
    </div>
    
    <script>
        // Generate background particles
        const bgParticles = document.getElementById('bgParticles');
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle-dot';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 20 + 's';
            bgParticles.appendChild(particle);
        }
    </script>
</body>
</html>
