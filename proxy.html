<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #00ff00;
        }
        body {
            background-color: #000;
            color: var(--primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        body.theme-amber { --primary: #ffb000; }
        body.theme-cyan { --primary: #00d4ff; }
        body.theme-violet { --primary: #b000ff; }
        body.theme-emerald { --primary: #00ff7f; }
        body.theme-rose { --primary: #ff1493; }
        body.theme-slate { --primary: #c0c0c0; }
        body.theme-crimson { --primary: #ff0000; }
        body.theme-teal { --primary: #00ffff; }
        body.theme-indigo { --primary: #4169e1; }
        body.theme-fuchsia { --primary: #ff00ff; }
        .loading-container {
            text-align: center;
            animation: popIn 0.5s ease-out;
        }
        .loading-text {
            font-size: 2rem;
            margin-bottom: 20px;
            text-shadow: 0 0 20px var(--primary);
        }
        .loading-spinner {
            font-size: 3rem;
            animation: spin 2s infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body class="theme-emerald">
    <div class="loading-container">
        <div class="loading-spinner">🦠</div>
        <div class="loading-text">Infectious🦠... Don't get infected (Loading LMAO)</div>
    </div>
    <script>
        const savedTheme = localStorage.getItem('theme') || 'emerald';
        document.body.className = `theme-${savedTheme}`;
        
        const params = new URLSearchParams(window.location.search);
        const url = params.get('url');
        
        if (url) {
            setTimeout(() => {
                window.location.href = url;
            }, 1500);
        }
    </script>
</body>
</html>
