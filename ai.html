<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infectious 🦠 AI</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .coming-soon {
            font-size: 4rem;
            font-weight: bold;
            color: var(--orange);
            text-shadow: 0 0 30px rgba(255, 149, 0, 0.5);
            text-align: center;
            margin-top: 50px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="globe-icon">🌐</div>
        </div>
        <div class="main-content">
            <header>
                <div class="nav-bar">
                    <button class="nav-btn">‹</button>
                    <button class="nav-btn">›</button>
                    <button class="nav-btn">⟳</button>
                    <button class="nav-btn">⌂</button>
                </div>
                <div class="url-bar">
                    <input type="text" placeholder="Search or enter URL">
                </div>
                <div class="nav-icons">
                    <button class="icon-btn">⛶</button>
                    <button class="icon-btn">🧩</button>
                    <button class="settings-btn" id="settingsBtn">⚙</button>
                </div>
            </header>
            <main class="home-page">
                <div class="coming-soon">COMING SOON</div>
            </main>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
