<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infectious 🦠 Apps</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            padding: 40px 20px;
            width: 100%;
            max-width: 1200px;
        }
        .app-card {
            aspect-ratio: 1;
            background-color: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--orange);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 3rem;
            text-decoration: none;
            color: var(--orange);
        }
        .app-card:hover {
            background-color: rgba(255, 149, 0, 0.1);
            box-shadow: 0 0 20px rgba(255, 149, 0, 0.4);
            transform: scale(1.05);
        }
        .app-label {
            position: absolute;
            bottom: 20px;
            color: var(--neon-green);
            font-size: 0.9rem;
            text-transform: capitalize;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="globe-icon">🌐</div>
        </div>
        <div class="main-content">
            <header>
                <div class="nav-bar">
                    <button class="nav-btn">‹</button>
                    <button class="nav-btn">›</button>
                    <button class="nav-btn">⟳</button>
                    <button class="nav-btn">⌂</button>
                </div>
                <div class="url-bar">
                    <input type="text" placeholder="Search or enter URL">
                </div>
                <div class="nav-icons">
                    <button class="icon-btn">⛶</button>
                    <button class="icon-btn">🧩</button>
                    <button class="settings-btn" id="settingsBtn">⚙</button>
                </div>
            </header>
            <main class="home-page">
                <div class="apps-grid">
                    <a href="https://github.com" target="_blank" class="app-card">🐙</a>
                    <a href="https://instagram.com" target="_blank" class="app-card">📷</a>
                    <a href="https://twitter.com" target="_blank" class="app-card">𝕏</a>
                    <a href="https://snapchat.com" target="_blank" class="app-card">👻</a>
                    <a href="https://discord.com" target="_blank" class="app-card">💬</a>
                </div>
            </main>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
