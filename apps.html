<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infectious 🦠 Apps</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            color: #00ff00;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 40px 20px;
        }
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .app-card {
            aspect-ratio: 1;
            background-color: rgba(0, 255, 0, 0.05);
            border: 2px solid #00ff00;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        }
        .app-card:hover {
            background-color: rgba(0, 255, 0, 0.15);
            box-shadow: 0 0 25px #00ff00;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="apps-grid">
        <a href="javascript:parent.loadPage('https://open.spotify.com')" class="app-card">🎧</a>
        <a href="javascript:parent.loadPage('https://github.com')" class="app-card">🐙</a>
        <a href="javascript:parent.loadPage('https://instagram.com')" class="app-card">📷</a>
        <a href="javascript:parent.loadPage('https://twitter.com')" class="app-card">𝕏</a>
        <a href="javascript:parent.loadPage('https://snapchat.com')" class="app-card">👻</a>
        <a href="javascript:parent.loadPage('https://discord.com')" class="app-card">💬</a>
    </div>
</body>
</html>
