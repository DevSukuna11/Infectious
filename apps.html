<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infectious 🦠 Apps</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            color: #00ff00;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 40px 20px;
        }
        .apps-container {
            max-width: 1200px;
            margin: 0 auto;
            animation: popIn 0.5s ease-out;
        }
        h1 {
            margin-bottom: 30px;
            text-shadow: 0 0 15px #00ff00;
        }
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }
        .app-card {
            aspect-ratio: 1;
            background-color: rgba(0, 255, 0, 0.05);
            border: 2px solid #00ff00;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
            gap: 12px;
        }
        .app-card:hover {
            background-color: rgba(0, 255, 0, 0.15);
            box-shadow: 0 0 25px #00ff00;
            transform: scale(1.05);
        }
        .app-icon {
            font-size: 2.5rem;
        }
        .app-name {
            font-size: 0.9rem;
            text-align: center;
            font-weight: 600;
        }
        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="apps-container">
        <h1>Infectious🦠 Apps</h1>
        <div class="apps-grid">
            <a href="javascript:parent.parent.loadPage('https://github.com')" class="app-card">
                <div class="app-icon">🐙</div>
                <div class="app-name">GitHub</div>
            </a>
            <a href="javascript:parent.parent.loadPage('https://open.spotify.com')" class="app-card">
                <div class="app-icon">🎧</div>
                <div class="app-name">Spotify</div>
            </a>
            <a href="javascript:parent.parent.loadPage('https://instagram.com')" class="app-card">
                <div class="app-icon">📷</div>
                <div class="app-name">Instagram</div>
            </a>
            <a href="javascript:parent.parent.loadPage('https://twitter.com')" class="app-card">
                <div class="app-icon">𝕏</div>
                <div class="app-name">Twitter</div>
            </a>
            <a href="javascript:parent.parent.loadPage('https://snapchat.com')" class="app-card">
                <div class="app-icon">👻</div>
                <div class="app-name">Snapchat</div>
            </a>
            <a href="javascript:parent.parent.loadPage('https://discord.com')" class="app-card">
                <div class="app-icon">💬</div>
                <div class="app-name">Discord</div>
            </a>
        </div>
    </div>
</body>
</html>
