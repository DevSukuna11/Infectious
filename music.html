<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infectious 🦠 Music</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .music-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            gap: 20px;
        }
        .music-controls {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 600px;
        }
        .music-controls input {
            flex: 1;
            padding: 10px 16px;
            background-color: rgba(0, 255, 0, 0.05);
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            border-radius: 8px;
            outline: none;
        }
        .music-controls button {
            padding: 10px 20px;
            background-color: var(--black);
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .music-controls button:hover {
            background-color: var(--neon-green);
            color: var(--black);
            box-shadow: 0 0 15px var(--neon-green);
        }
        .music-player {
            width: 100%;
            max-width: 900px;
            height: 500px;
            border: 2px solid var(--neon-green);
            border-radius: 12px;
            overflow: hidden;
            background-color: rgba(0, 255, 0, 0.05);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="globe-icon">🦠</div>
        </div>
        <div class="main-content">
            <header>
                <div class="nav-bar">
                    <button class="nav-btn">‹</button>
                    <button class="nav-btn">›</button>
                    <button class="nav-btn">🔄</button>
                    <button class="nav-btn">⌂</button>
                </div>
                <div class="url-bar">
                    <input type="text" placeholder="Search or enter URL">
                </div>
                <div class="nav-icons">
                    <button class="icon-btn">⛶</button>
                    <button class="icon-btn">🧬</button>
                    <button class="settings-btn" id="settingsBtn">⚙</button>
                </div>
            </header>
            <main class="music-container">
                <div class="music-controls">
                    <input type="text" id="searchInput" placeholder="Search music...">
                    <button id="searchBtn">Search</button>
                </div>
                <div class="music-player">
                    <iframe id="musicFrame" width="100%" height="100%" frameborder="0" allow="autoplay"></iframe>
                </div>
            </main>
        </div>
    </div>
    <div id="settingsPanel" class="settings-panel">
        <div class="settings-content">
            <h2>Infectious 🦠 Settings</h2>
            <div class="settings-options">
                <div class="setting-item">
                    <label>Theme</label>
                    <select>
                        <option>Neon Green</option>
                        <option>Neon Blue</option>
                        <option>Neon Purple</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>Homepage</label>
                    <input type="text" value="https://infectious.local">
                </div>
                <div class="setting-item">
                    <label>Clear Browsing Data</label>
                    <button class="btn-settings">Clear</button>
                </div>
            </div>
            <button id="closeSettings" class="close-btn">✕</button>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        document.getElementById('searchBtn').addEventListener('click', function() {
            const query = document.getElementById('searchInput').value;
            if (query) {
                const url = `https://open.spotify.com/embed/search/${encodeURIComponent(query)}`;
                document.getElementById('musicFrame').src = url;
            }
        });
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('searchBtn').click();
        });
    </script>
</body>
</html>
