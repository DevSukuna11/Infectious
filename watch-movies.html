<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infectious 🦠 Movies</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            color: #00ff00;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        .movies-container {
            max-width: 1400px;
            margin: 0 auto;
            animation: popIn 0.5s ease-out;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        h1 {
            margin-bottom: 20px;
            text-shadow: 0 0 15px #00ff00;
        }
        .movies-frame {
            flex: 1;
            border: 2px solid #00ff00;
            border-radius: 12px;
            overflow: hidden;
        }
        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="movies-container">
        <h1>Infectious🦠 Movies/TV Shows</h1>
        <div class="movies-frame">
            <iframe src="https://cineby.sc" style="width:100%; height:100%; border:none;"></iframe>
        </div>
    </div>
</body>
</html>
