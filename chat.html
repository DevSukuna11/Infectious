<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infectious 🦠 Chat</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="chat-styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <h1 class="title">Infectious 🦠</h1>
                <button class="menu-toggle" id="menuToggle">🪛</button>
            </div>
            <nav class="dropdown-menu" id="dropdownMenu">
                <a href="index.html" class="nav-item">Home 🏠</a>
                <a href="games.html" class="nav-item">Games 🎮</a>
                <a href="watch.html" class="nav-item">Watch ▶</a>
                <a href="apps.html" class="nav-item">Apps 📱</a>
                <a href="music.html" class="nav-item">Listen 🎧</a>
                <a href="chat.html" class="nav-item">Chat 💬 <span class="badge">Coming Soon</span></a>
                <a href="ai.html" class="nav-item">AI 🤖 <span class="badge">Coming Soon</span></a>
                <a href="browse.html" class="nav-item">Browse 🌐</a>
            </nav>
        </header>
        <main class="content">
            <h2>Infectious 🦠 Chat</h2>
            <div id="authContainer" class="auth-container">
                <div class="signup-box">
                    <h3>Create Account</h3>
                    <form id="signupForm">
                        <input type="text" id="username" placeholder="Username" required>
                        <input type="email" id="email" placeholder="Email" required>
                        <input type="password" id="password" placeholder="Password" required>
                        <input type="text" id="cashtag" placeholder="Cashtag" required>
                        <button type="submit" class="btn">Sign Up</button>
                    </form>
                </div>
            </div>
            <div id="chatContainer" class="chat-container" style="display: none;">
                <p style="margin-top: 40px; font-size: 1.2rem;">Chat coming soon...</p>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
    <script src="chat-script.js"></script>
</body>
</html>
