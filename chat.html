<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infectious 🦠 Chat</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .chat-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .chat-message {
            font-size: 2rem;
            color: var(--orange);
            text-align: center;
            text-shadow: 0 0 20px rgba(255, 149, 0, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="globe-icon">🌐</div>
        </div>
        <div class="main-content">
            <header>
                <div class="nav-bar">
                    <button class="nav-btn">‹</button>
                    <button class="nav-btn">›</button>
                    <button class="nav-btn">⟳</button>
                    <button class="nav-btn">⌂</button>
                </div>
                <div class="url-bar">
                    <input type="text" placeholder="Search or enter URL">
                </div>
                <div class="nav-icons">
                    <button class="icon-btn">⛶</button>
                    <button class="icon-btn">🧩</button>
                    <button class="settings-btn" id="settingsBtn">⚙</button>
                </div>
            </header>
            <main class="chat-container">
                <div class="chat-message">Can't create account yet till released</div>
            </main>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
