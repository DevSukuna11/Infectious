<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infectious 🦠 Watch</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            color: #00ff00;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 40px 20px;
        }
        .watch-container {
            max-width: 1200px;
            margin: 0 auto;
            animation: popIn 0.5s ease-out;
        }
        h1 {
            margin-bottom: 30px;
            text-shadow: 0 0 15px #00ff00;
        }
        .watch-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }
        .watch-card {
            aspect-ratio: 1;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(0,255,0,0.05) 100%);
            border: 2px solid #00ff00;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
            padding: 20px;
            gap: 15px;
        }
        .watch-card:hover {
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(0,255,0,0.1) 100%);
            box-shadow: 0 0 25px #00ff00;
            transform: scale(1.05);
        }
        .watch-icon {
            font-size: 3rem;
        }
        .watch-label {
            font-size: 1rem;
            text-align: center;
            font-weight: 600;
        }
        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="watch-container">
        <h1>▶ Watch</h1>
        <div class="watch-grid">
            <a href="javascript:parent.parent.loadPage('https://youtube.com')" class="watch-card">
                <div class="watch-icon">▶</div>
                <div class="watch-label">YouTube</div>
            </a>
            <a href="javascript:parent.parent.loadPage('watch-movies.html')" class="watch-card">
                <div class="watch-icon">🎬</div>
                <div class="watch-label">Movies/TV Shows</div>
            </a>
        </div>
    </div>
</body>
</html>
