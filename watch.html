<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infectious 🦠 Watch</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .coming-soon {
            font-size: 5rem;
            font-weight: bold;
            color: var(--neon-green);
            text-shadow: 0 0 40px var(--neon-green);
            text-align: center;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <a href="index.html" class="menu-icon return-btn">🔙</a>
            <div class="menu-panel">
                <div class="menu-title">Infectious 🦠</div>
                <a href="index.html" class="menu-item">🏠 Home</a>
                <a href="games.html" class="menu-item">🎮 Games</a>
                <a href="watch.html" class="menu-item">▶ Watch</a>
                <a href="apps.html" class="menu-item">📱 Apps</a>
                <a href="music.html" class="menu-item">🎧 Music</a>
                <a href="chat.html" class="menu-item">💬 Chat</a>
                <a href="ai.html" class="menu-item">🤖 AI</a>
                <a href="browse.html" class="menu-item">🌐 Browse</a>
            </div>
        </div>
        <div class="main-content">
            <header>
                <div class="nav-bar">
                    <button class="nav-btn">‹</button>
                    <button class="nav-btn">›</button>
                    <button class="nav-btn">🔄</button>
                    <button class="nav-btn">⌂</button>
                </div>
                <div class="url-bar">
                    <input type="text" placeholder="Search or enter URL">
                </div>
                <div class="nav-icons">
                    <button class="icon-btn">⛶</button>
                    <button class="icon-btn">🎚</button>
                    <button class="settings-btn" id="settingsBtn">⚙</button>
                </div>
            </header>
            <main class="home-page">
                <div class="coming-soon">COMING SOON</div>
            </main>
        </div>
    </div>
    <div id="settingsPanel" class="settings-panel">
        <div class="settings-content">
            <h2>Infectious 🦠 Settings</h2>
            <div class="settings-options">
                <div class="setting-item">
                    <label>Theme</label>
                    <select>
                        <option>Neon Green</option>
                        <option>Neon Blue</option>
                        <option>Neon Purple</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>Homepage</label>
                    <input type="text" value="https://infectious.local">
                </div>
                <div class="setting-item">
                    <label>Clear Browsing Data</label>
                    <button class="btn-settings">Clear</button>
                </div>
            </div>
            <button id="closeSettings" class="close-btn">✕</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
