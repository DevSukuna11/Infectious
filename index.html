<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infectious 🦠</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="menu-icon">🪛</div>
            <div class="menu-panel">
                <div class="menu-title">Infectious 🦠</div>
                <a href="index.html" class="menu-item">🏠 Home</a>
                <a href="games.html" class="menu-item">🎮 Games</a>
                <a href="watch.html" class="menu-item">▶ Watch</a>
                <a href="apps.html" class="menu-item">📱 Apps</a>
                <a href="music.html" class="menu-item">🎧 Music</a>
                <a href="chat.html" class="menu-item">💬 Chat</a>
                <a href="ai.html" class="menu-item">🤖 AI</a>
                <a href="browse.html" class="menu-item">🌐 Browse</a>
            </div>
        </div>
        <div class="main-content">
            <header>
                <div class="nav-bar">
                    <button class="nav-btn">‹</button>
                    <button class="nav-btn">›</button>
                    <button class="nav-btn">🔄</button>
                    <button class="nav-btn">⌂</button>
                </div>
                <div class="url-bar">
                    <input type="text" placeholder="Search or enter URL">
                </div>
                <div class="nav-icons">
                    <button class="icon-btn">⛶</button>
                    <button class="icon-btn">🎚</button>
                    <button class="settings-btn" id="settingsBtn">⚙</button>
                </div>
            </header>
            <main class="home-page">
                <div class="logo-section">
                    <h1>Infectious 🦠</h1>
                </div>
                <div class="search-section">
                    <div class="search-box">
                        <span class="search-icon">🔍</span>
                        <input type="text" placeholder="Search or enter URL..." id="mainSearch">
                    </div>
                </div>
                <div class="shortcuts-section">
                    <a href="https://www.youtube.com" target="_blank" class="shortcut">
                        <div class="shortcut-icon">▶</div>
                        <div class="shortcut-label">youtube</div>
                    </a>
                    <a href="https://github.com" target="_blank" class="shortcut">
                        <div class="shortcut-icon">🐙</div>
                        <div class="shortcut-label">github</div>
                    </a>
                    <a href="https://discord.com" target="_blank" class="shortcut">
                        <div class="shortcut-icon">💬</div>
                        <div class="shortcut-label">discord</div>
                    </a>
                    <a href="https://twitter.com" target="_blank" class="shortcut">
                        <div class="shortcut-icon">𝕏</div>
                        <div class="shortcut-label">twitter</div>
                    </a>
                    <a href="https://reddit.com" target="_blank" class="shortcut">
                        <div class="shortcut-icon">🔴</div>
                        <div class="shortcut-label">reddit</div>
                    </a>
                    <a href="https://instagram.com" target="_blank" class="shortcut">
                        <div class="shortcut-icon">📷</div>
                        <div class="shortcut-label">instagram</div>
                    </a>
                </div>
            </main>
        </div>
    </div>

    <div id="settingsPanel" class="settings-panel">
        <div class="settings-content">
            <h2>Infectious 🦠 Settings</h2>
            <div class="settings-options">
                <div class="setting-item">
                    <label>Theme</label>
                    <select>
                        <option>Neon Green</option>
                        <option>Neon Blue</option>
                        <option>Neon Purple</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>Homepage</label>
                    <input type="text" value="https://infectious.local">
                </div>
                <div class="setting-item">
                    <label>Clear Browsing Data</label>
                    <button class="btn-settings">Clear</button>
                </div>
            </div>
            <button id="closeSettings" class="close-btn">✕</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
