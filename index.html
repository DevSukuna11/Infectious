<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infectious 🦠</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <div class="globe-icon">🦠</div>
        </div>
        <div class="main-content">
            <header>
                <div class="nav-bar">
                    <button class="nav-btn">‹</button>
                    <button class="nav-btn">›</button>
                    <button class="nav-btn">🔄</button>
                    <button class="nav-btn">⌂</button>
                </div>
                <div class="url-bar">
                    <input type="text" placeholder="Search or enter URL">
                </div>
                <div class="nav-icons">
                    <button class="icon-btn">⛶</button>
                    <button class="icon-btn">🧬</button>
                    <button class="settings-btn" id="settingsBtn">⚙</button>
                </div>
            </header>
            <main class="home-page">
                <div class="logo-section">
                    <h1>Infectious 🦠</h1>
                </div>
                <div class="search-section">
                    <div class="search-box">
                        <span class="search-icon">🔍</span>
                        <input type="text" placeholder="Search or enter URL..." id="mainSearch">
                    </div>
                </div>
                <div class="shortcuts-section">
                    <a href="index.html" class="shortcut">
                        <div class="shortcut-icon">🏠</div>
                        <div class="shortcut-label">home</div>
                    </a>
                    <a href="games.html" class="shortcut">
                        <div class="shortcut-icon">🎮</div>
                        <div class="shortcut-label">games</div>
                    </a>
                    <a href="watch.html" class="shortcut">
                        <div class="shortcut-icon">▶</div>
                        <div class="shortcut-label">watch</div>
                    </a>
                    <a href="apps.html" class="shortcut">
                        <div class="shortcut-icon">📱</div>
                        <div class="shortcut-label">apps</div>
                    </a>
                    <a href="music.html" class="shortcut">
                        <div class="shortcut-icon">🎧</div>
                        <div class="shortcut-label">music</div>
                    </a>
                    <a href="chat.html" class="shortcut">
                        <div class="shortcut-icon">💬</div>
                        <div class="shortcut-label">chat</div>
                    </a>
                    <a href="browse.html" class="shortcut">
                        <div class="shortcut-icon">🌐</div>
                        <div class="shortcut-label">browse</div>
                    </a>
                </div>
            </main>
        </div>
    </div>
    <div id="settingsPanel" class="settings-panel">
        <div class="settings-content">
            <h2>Infectious 🦠 Settings</h2>
            <div class="settings-options">
                <div class="setting-item">
                    <label>Theme</label>
                    <select>
                        <option>Neon Green</option>
                        <option>Neon Blue</option>
                        <option>Neon Purple</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>Homepage</label>
                    <input type="text" value="https://infectious.local">
                </div>
                <div class="setting-item">
                    <label>Clear Browsing Data</label>
                    <button class="btn-settings">Clear</button>
                </div>
            </div>
            <button id="closeSettings" class="close-btn">✕</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
