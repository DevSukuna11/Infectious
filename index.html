<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infectious 🦠</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="theme-emerald">
    <div class="container">
        <header>
            <div class="nav-buttons">
                <button class="nav-btn" onclick="goBack()">‹</button>
                <button class="nav-btn" onclick="goForward()">›</button>
                <button class="nav-btn" onclick="reload()">↻</button>
                <button class="nav-btn" onclick="goHome()">⌂</button>
            </div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Infectious🦠://NewTAB" onkeypress="handleSearch(event)">
            </div>
            <div class="icon-btns">
                <button class="icon-btn">⛶</button>
                <button class="icon-btn">🧩</button>
                <button class="icon-btn" onclick="openSettings()">⚙</button>
            </div>
        </header>
        <div class="main-content">
            <iframe id="mainFrame" src="about:blank"></iframe>
        </div>
    </div>

    <div class="floating-menu">
        <button class="menu-toggle" id="menuToggle">🦠</button>
        <div class="menu-panel" id="menuPanel">
            <div class="menu-title">Infectious 🦠</div>
            <button class="menu-item" onclick="navigateTo('home')">🏠 Home</button>
            <button class="menu-item" onclick="navigateTo('games')">🎮 Games</button>
            <button class="menu-item" onclick="navigateTo('watch')">▶ Watch</button>
            <button class="menu-item" onclick="navigateTo('apps')">📱 Apps</button>
            <button class="menu-item" onclick="navigateTo('music')">🎧 Music</button>
            <button class="menu-item" onclick="navigateTo('chat')">💬 Chat</button>
            <button class="menu-item" onclick="navigateTo('ai')">🤖 AI</button>
            <button class="menu-item" onclick="navigateTo('browse')">🌐 Browse</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
